<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#15243a">
	<meta name="description" content="Sweden Mayhem - Hytale Server. Progression-focused PvE survival with RPG skill trees, instanced dungeons, and weekly worlds.">
	<meta property="og:title" content="Sweden Mayhem - <%= currentPage.title %>">
	<meta property="og:description" content="Progression-focused PvE survival Hytale server with RPG skill trees, instanced dungeons, and weekly worlds.">
	<meta property="og:type" content="website">
	<meta property="og:image" content="https://swedenmayhem.se/hytale/images/screenshot-dungeon.jpg">
	<meta name="twitter:card" content="summary_large_image">
	<link rel="canonical" href="https://swedenmayhem.se/hytale/<%= currentPage.name %>">
	<link rel="stylesheet" href="style.css" />
	<title>Sweden Mayhem - <%= currentPage.title %></title>
</head>
<body>
	<header>
		<div id="logo">
			<a href="/">
				<img src="swm_transparent.png" alt="Sweden Mayhem" />
			</a>
		</div>
		<nav>
			<ul>
				<li><a href="index">Welcome</a></li>
<% for(const page of pages){ %>
				<li <%~ currentPage.name==page.name?'class="active"':'' %>><a href="<%= page.name %>"><%= page.title %></a></li>
<% } %>
<% for(const section of sections) if(section.hasIndex) { %>
				<li><a href="<%= section.name %>/"><%= section.title %></a></li>
<% } %>
			</ul>
		</nav>
	</header>

	<article>
<%~ currentPage.html %>
	</article>
</body>
</html>
